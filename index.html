<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPL-A Quiz</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PPL-A Quiz">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Answer buttons ─────────────────────────────────── */
    .answer-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 14px 18px;
      margin-bottom: 10px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      color: #1f2937;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.5;
      transition: border-color 0.12s, background 0.12s;
    }
    .answer-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }
    .answer-btn.correct {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }
    .answer-btn.correct:hover { background: #16a34a; border-color: #16a34a; }
    .answer-btn.wrong {
      background: #b91c1c;
      border-color: #b91c1c;
      color: #fff;
    }
    .answer-btn.wrong:hover { background: #991b1b; border-color: #991b1b; }

    /* ── Question card ──────────────────────────────────── */
    .question-card {
      background: #fff;
      border: 1px solid #f1f5f9;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .question-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .question-id {
      font-weight: 700;
      font-size: 13px;
      color: #2563eb;
      letter-spacing: .02em;
    }
    .meta-sep { color: #cbd5e1; font-size: 13px; }
    .lightbulb { font-size: 15px; }
    .question-text {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.35;
      margin: 4px 0 18px;
    }
    .answers-list { display: flex; flex-direction: column; }

    /* ── URL reference bubble ───────────────────────────── */
    .ref-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.12s, transform 0.12s;
    }
    .ref-btn:hover { background: #bfdbfe; transform: scale(1.1); }

    /* ── Mini answered progress in pagination ───────────── */
    .page-nav-center { text-align: center; }
    .mini-progress {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      justify-content: center;
    }
    .mini-track {
      width: 72px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
    }
    .mini-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .mini-pct {
      font-size: 11px;
      color: #9ca3af;
      min-width: 30px;
      text-align: left;
    }

    /* ── Drawer ─────────────────────────────────────────── */
    #drawer {
      position: fixed;
      top: 0; right: 0;
      height: 100%;
      width: 300px;
      max-width: 90vw;
      background: #fff;
      box-shadow: -6px 0 30px rgba(0,0,0,.15);
      z-index: 50;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
      padding: 24px;
      overflow-y: auto;
    }
    #drawer.open { transform: translateX(0); }

    /* ── Stats in drawer ────────────────────────────────── */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 14px;
      color: #475569;
      border-bottom: 1px solid #f1f5f9;
    }
    .stat-row:last-child { border-bottom: none; }
    .correct-count { color: #16a34a; }
    .wrong-count   { color: #b91c1c; }

    /* ── Favourite star button ──────────────────────────── */
    .fav-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      color: #cbd5e1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.12s, transform 0.12s;
    }
    .fav-btn:hover { color: #f59e0b; transform: scale(1.15); }
    .fav-btn.active { color: #f59e0b; }

    /* ── View selector buttons in drawer ────────────────── */
    .view-btn {
      flex: 1;
      padding: 9px 4px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      color: #374151;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    .view-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .view-btn:not(.active):hover { background: #f8fafc; border-color: #94a3b8; }

    /* ── Nav buttons ────────────────────────────────────── */
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      color: #374151;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .1s, border-color .1s;
    }
    .nav-btn:hover:not(:disabled) { background: #f8fafc; border-color: #94a3b8; }
    .nav-btn:disabled { opacity: .38; cursor: default; }

    /* ── Subject selection cards ────────────────────────── */
    .subject-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 14px;
      padding: 20px 22px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      text-align: left;
      width: 100%;
    }
    .subject-card:hover {
      border-color: #2563eb;
      box-shadow: 0 4px 16px rgba(37,99,235,.12);
      transform: translateY(-1px);
    }
    .subject-card:active { transform: translateY(0); }
    .subject-icon {
      font-size: 36px;
      line-height: 1;
      flex-shrink: 0;
      width: 48px;
      text-align: center;
    }
    .subject-info { flex: 1; min-width: 0; }
    .subject-name {
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.3;
    }
    .subject-meta {
      font-size: 13px;
      color: #64748b;
      margin-top: 3px;
    }
    .subject-progress-bar {
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .subject-progress-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ── Sticky header ──────────────────────────────────── -->
  <header class="bg-white shadow-sm sticky top-0 z-30">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="back-btn"
          class="hidden p-2 -ml-2 rounded-lg hover:bg-gray-100 text-gray-600 transition-colors"
          aria-label="Wróć do wyboru działu">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="13,4 7,10 13,16"/>
          </svg>
        </button>
        <span class="text-2xl select-none">✈️</span>
        <div>
          <h1 id="header-title" class="font-bold text-gray-900 text-base leading-tight">PPL-A Quiz</h1>
          <p class="text-xs text-gray-500" id="progress-text">Wybierz dział</p>
        </div>
      </div>
      <button id="hamburger-btn"
        class="hidden p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition-colors"
        aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="5"  x2="20" y2="5"/>
          <line x1="2" y1="11" x2="20" y2="11"/>
          <line x1="2" y1="17" x2="20" y2="17"/>
        </svg>
      </button>
    </div>
    <!-- Progress bar -->
    <div class="h-1 bg-gray-100">
      <div id="progress-bar"
           class="h-1 bg-blue-600 transition-all duration-500"
           style="width:0%"></div>
    </div>
  </header>

  <!-- ── Subject selection screen ───────────────────────── -->
  <div id="subject-screen" class="max-w-3xl mx-auto px-4 py-10">
    <div class="text-center mb-8">
      <p class="text-gray-500 text-base">Wybierz dział do nauki</p>
    </div>
    <div id="subject-list" class="flex flex-col gap-4"></div>
  </div>

  <!-- ── Quiz screen (hidden until subject selected) ────── -->
  <div id="quiz-screen" class="hidden">
    <main class="max-w-3xl mx-auto px-4 py-6">

      <!-- Pagination top -->
      <div class="flex items-center justify-between mb-6">
        <button id="prev-top" class="nav-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="10,3 5,8 10,13"/></svg>
          Poprzednia
        </button>
        <span id="page-info-top" class="text-sm text-gray-500 font-medium"></span>
        <button id="next-top" class="nav-btn">
          Następna
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,3 11,8 6,13"/></svg>
        </button>
      </div>

      <!-- Questions -->
      <div id="questions"></div>

      <!-- Pagination bottom -->
      <div class="flex items-center justify-between mt-2">
        <button id="prev-bot" class="nav-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="10,3 5,8 10,13"/></svg>
          Poprzednia
        </button>
        <span id="page-info-bot" class="text-sm text-gray-500 font-medium"></span>
        <button id="next-bot" class="nav-btn">
          Następna
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,3 11,8 6,13"/></svg>
        </button>
      </div>

    </main>
  </div>

  <!-- ── Overlay ────────────────────────────────────────── -->
  <div id="overlay" class="hidden fixed inset-0 bg-black bg-opacity-40 z-40"></div>

  <!-- ── Drawer ─────────────────────────────────────────── -->
  <div id="drawer" role="dialog" aria-label="Menu">

    <div class="flex items-center justify-between mb-6">
      <h2 class="text-lg font-bold text-gray-900">Menu</h2>
      <button id="close-drawer"
        class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500"
        aria-label="Zamknij menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="4" x2="16" y2="16"/>
          <line x1="16" y1="4" x2="4" y2="16"/>
        </svg>
      </button>
    </div>

    <!-- View selector -->
    <div class="flex gap-2 mb-5">
      <button id="view-all-btn" class="view-btn active">Wszystkie pytania</button>
      <button id="view-fav-btn" class="view-btn">Ulubione</button>
    </div>

    <!-- Stats -->
    <div id="drawer-stats"
         class="bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 mb-6 text-sm">
    </div>

    <!-- Go to page -->
    <label class="block text-sm font-semibold text-gray-700 mb-2">Przejdź do strony</label>
    <div class="flex gap-2 mb-6">
      <input id="goto-input" type="number" min="1"
        class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button id="goto-btn"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg
               text-sm font-medium transition-colors">
        Idź
      </button>
    </div>

    <hr class="border-gray-100 mb-6">

    <!-- Change subject -->
    <button id="change-subject-btn"
      class="w-full flex items-center justify-center gap-2 bg-slate-100
             hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-semibold
             transition-colors text-sm mb-3">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="10,3 5,8 10,13"/>
      </svg>
      Zmień dział
    </button>

    <!-- Reset -->
    <button id="reset-btn"
      class="w-full flex items-center justify-center gap-2 bg-red-600
             hover:bg-red-700 text-white py-3 rounded-xl font-semibold
             transition-colors text-sm">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 8a6 6 0 1 1 1.5 4"/>
        <polyline points="2,12 2,8 6,8"/>
      </svg>
      Resetuj wszystkie odpowiedzi
    </button>

    <button id="reset-fav-btn"
      class="w-full flex items-center justify-center gap-2 bg-amber-500
             hover:bg-amber-600 text-white py-3 rounded-xl font-semibold
             transition-colors text-sm mt-3">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 8a6 6 0 1 1 1.5 4"/>
        <polyline points="2,12 2,8 6,8"/>
      </svg>
      Resetuj odpowiedzi ulubionych
    </button>

    <p class="text-xs text-gray-400 mt-3 text-center">
      Odpowiedzi są zapisywane lokalnie w przeglądarce.
    </p>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
